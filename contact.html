<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Contact</title>
    <style>
     * {
        font-family: Arial, sans-serif;
    }

body{
    background:#f8f4f6;
  }

  .nav-bar{
    position:fixed;
    top:0;
    left:0;
    z-index: 1000;
    width:95.5%;
    padding:10px 30px;
    background:#eedbdf;
    border-bottom-left-radius:20px;
    border-bottom-right-radius:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.nav-text{
    display:flex;
    flex-direction:column;
}
.nav-text h1{
    color:#c97b84;
    font-size:24px;
    margin:0;
    padding-top:10px;
}
.nav-text p {
    font-size: 20px;
    line-height: 0.5;
    color: #444;
    max-width: 600px;
}

.nav-btn li{
    display:inline;
}

.nav-btn{
    display:flex;
    justify-content:flex-end;
    list-style:none;
    gap:10px;
    margin:0;
    padding:0;
}
.btn{
    background-color: white;
    color: black;
    border: none;
    text-decoration: none;
    padding: 10px 18px;
    font-size: 14px;
    cursor: pointer;
    border-radius: 20px;
    margin: 10px 5px;
    text-align: center;
    transition:0.3s;
    display:inline-flex;
}

.btn:hover{
    background-color: #b36b74;
    color:white;
}
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="nav-text">
            <h1>Nos services</h1>
            <p>
                Découvrez nos sage-femmes, médecins et notre communauté.
            </p>
        </div>
        <ul class="nav-btn">
            <li><a href="index.html" class="btn">Accueil</a></li>
        </ul>
    </div>  
</body>
</html>
